# Cosmo Router 設定 (ローカル/オンプレ)
# ローカル合成した execution config をファイルから読む場合:
version: "1"

execution_config:
  file:
    path: "/etc/cosmo/router-config.json"

listen_addr: "0.0.0.0:3002"

# aruaru-db サブグラフへのヘッダ伝播 (例: 認証)
headers:
  subgraphs:
    aruaru-db:
      request:
        - op: "propagate"
          named: "Authorization"

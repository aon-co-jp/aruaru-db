name: Release binaries

# タグ(例: v0.1.0)をpushすると、Linux(x86_64-unknown-linux-gnu)・
# Windows(x86_64)向けに`aruaru-server`をビルドし、GitHub Releasesへ添付する。
# open-web-server/RPoemで確立したパターンをそのまま踏襲。

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release --bin aruaru-server
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/aruaru-server dist/aruaru-server
          cp install.sh dist/install.sh
          tar -czf aruaru-db-linux-x86_64.tar.gz -C dist aruaru-server install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: aruaru-db-linux-x86_64
          path: aruaru-db-linux-x86_64.tar.gz

  build-windows:
    name: Windows (x86_64、Windows Server含む)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release --bin aruaru-server
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/aruaru-server.exe dist/
          Copy-Item install.ps1 dist/
          Compress-Archive -Path dist/* -DestinationPath aruaru-db-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: aruaru-db-windows-x86_64
          path: aruaru-db-windows-x86_64.zip

  release:
    name: GitHub Releaseへ添付
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            aruaru-db-linux-x86_64/aruaru-db-linux-x86_64.tar.gz
            aruaru-db-windows-x86_64/aruaru-db-windows-x86_64.zip
